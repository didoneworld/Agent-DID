apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-os
  namespace: agent-os
  labels: { app: agent-os }
spec:
  replicas: 2
  selector:
    matchLabels: { app: agent-os }
  template:
    metadata:
      labels: { app: agent-os }
    spec:
      containers:
        - name: app
          image: agent-identity:local
          imagePullPolicy: IfNotPresent
          env:
            - { name: PORT, value: "8000" }
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: agent-os-secrets, key: DATABASE_URL }
            - name: SESSION_SIGNING_SECRET
              valueFrom:
                secretKeyRef: { name: agent-os-secrets, key: SESSION_SIGNING_SECRET }
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: agent-os
  namespace: agent-os
spec:
  selector: { app: agent-os }
  ports:
    - { port: 80, targetPort: 8000 }
