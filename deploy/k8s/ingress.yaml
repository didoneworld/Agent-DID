apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-os
  namespace: agent-os
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: agent-os.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-os
                port:
                  number: 80
